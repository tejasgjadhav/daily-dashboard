name: Daily Dashboard Update (Claude API)

# Fully server-side daily dashboard refresh.
# No laptop required — Claude API + GitHub Actions + GitHub Pages.
#
# Trigger: weekdays at 05:45 AM IST (= 00:15 UTC).
# Scheduled early on purpose — GitHub Actions cron is best-effort and can
# slip 1-3 hours during peak hours. By scheduling at off-peak UTC (00:15)
# with a non-round minute, the dashboard lands well before 8:30 IST.
# Also supports manual trigger from the Actions tab.

on:
  schedule:
    - cron: '15 0 * * 1-5'   # 05:45 AM IST · Mon-Fri (UTC 00:15) — off-peak + non-round minute
  workflow_dispatch:

permissions:
  contents: write   # needed to push the refreshed index.html back to main

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Sanity check — secret is present
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set in this repo. See README for setup."
            exit 1
          fi
          echo "API key present (length ${#ANTHROPIC_API_KEY})."

      - name: Run Claude API dashboard update
        id: update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: 'claude-sonnet-4-6'
          MAX_TOKENS: '32000'
          MAX_WEB_SEARCHES: '12'
        run: python scripts/update_dashboard.py

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in index.html."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "index.html updated — proceeding to commit."
            git diff --stat index.html
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          TS=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          git commit -m "📊 Daily auto-update — ${TS} · Claude API + GitHub Actions"
          git push origin HEAD:main

      - name: Summary
        if: always()
        run: |
          {
            echo "### Daily Dashboard Run"
            echo ""
            echo "- Run time (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- Run time (IST): $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S')"
            echo "- index.html changed: ${{ steps.changes.outputs.changed }}"
            echo "- Update step outcome: ${{ steps.update.outcome }}"
            echo "- Dashboard: https://tejasgjadhav.github.io/daily-dashboard"
          } >> "$GITHUB_STEP_SUMMARY"
