name: Daily Dashboard Update

on:
  schedule:
    # 8:30 AM IST = 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch market data and update dashboard
        run: |
          python << 'EOF'
          import json
          from datetime import datetime
          import pytz

          # Get IST time
          ist = pytz.timezone('Asia/Kolkata')
          now_ist = datetime.now(ist).strftime('%Y-%m-%d %H:%M IST')

          # Market data (in real automation, these would be fetched from APIs)
          market_data = {
              'gift_nifty': '24,280',
              'nifty_50': '24,176',
              'sensex': '77,328',
              'vix': '16.84',
              'usd_inr': '95.43',
              'timestamp': now_ist
          }

          # Read current HTML
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          # Update timestamp in footer
          html = html.replace(
              'Last update: <strong>May 11, 2026 8:30 AM IST</strong>',
              f'Last update: <strong>{now_ist}</strong>'
          )

          # Update GIFT Nifty value
          html = html.replace(
              '<div style="font-size: 36px; font-weight: 700; margin-bottom: 5px;">24,280</div>',
              f'<div style="font-size: 36px; font-weight: 700; margin-bottom: 5px;">{market_data["gift_nifty"]}</div>'
          )

          # Write updated HTML back
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print(f"✅ Dashboard updated at {now_ist}")
          print(f"✅ GIFT Nifty: {market_data['gift_nifty']}")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add index.html
          git commit -m "🤖 Automated dashboard update - $(date '+%Y-%m-%d %H:%M IST')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .

      - name: Send success notification
        if: success()
        run: |
          echo "✅ Dashboard updated successfully at $(date '+%Y-%m-%d %H:%M IST')"
          echo "📊 Live at: https://tejasgjadhav.github.io/daily-dashboard"

      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ Dashboard update failed"
          echo "Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
