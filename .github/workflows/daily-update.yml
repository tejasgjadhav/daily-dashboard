name: Daily Dashboard Update (Claude API + free fallback)

# Fully server-side daily dashboard refresh.
# No laptop required — Claude API + GitHub Actions + GitHub Pages.
#
# If the Claude API call fails or returns a malformed response, the script
# automatically falls back to free, web-grounded open models (Perplexity
# Sonar family) served via Puter.com, using the same prompt — see
# scripts/update_dashboard.py and the README "Fallback" section.
#
# Trigger: 23:00 UTC Sun-Thu (= 04:30 IST Mon-Fri).
# GitHub Actions cron is best-effort and slips ~4 hours during peak UTC hours.
# Scheduling at 23:00 UTC (previous evening) absorbs that slip so the
# dashboard lands around 08:30 IST — well before cash market open at 09:15 IST.
# Also supports manual trigger from the Actions tab.

on:
  schedule:
    - cron: '0 23 * * 0-4'   # 04:30 IST Mon-Fri (23:00 UTC Sun-Thu) — ~4h slip → ~08:30 IST
  workflow_dispatch:

permissions:
  contents: write   # needed to push the refreshed index.html back to main

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Sanity check — credentials are present
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUTER_TOKEN: ${{ secrets.PUTER_TOKEN }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ] && [ -z "${PUTER_TOKEN:-}" ]; then
            echo "::error::Neither ANTHROPIC_API_KEY nor PUTER_TOKEN secret is set. See README for setup."
            exit 1
          fi
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set — will rely entirely on the free fallback models."
          else
            echo "Anthropic API key present (length ${#ANTHROPIC_API_KEY})."
          fi
          if [ -z "${PUTER_TOKEN:-}" ]; then
            echo "::warning::PUTER_TOKEN not set — no fallback available if Claude fails."
          else
            echo "Puter fallback token present (length ${#PUTER_TOKEN})."
          fi

      - name: Run dashboard update (Claude, falls back to free open models)
        id: update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: 'claude-sonnet-4-6'
          MAX_TOKENS: '32000'
          MAX_WEB_SEARCHES: '15'
          PUTER_TOKEN: ${{ secrets.PUTER_TOKEN }}
          FALLBACK_MODELS: 'perplexity/sonar-pro,perplexity/sonar-reasoning-pro,perplexity/sonar'
          FALLBACK_MAX_TOKENS: '8000'
        run: python scripts/update_dashboard.py

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in index.html."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "index.html updated — proceeding to commit."
            git diff --stat index.html
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          TS=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          git commit -m "📊 Daily auto-update — ${TS} · Claude API + GitHub Actions"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Summary
        if: always()
        run: |
          {
            echo "### Daily Dashboard Run"
            echo ""
            echo "- Run time (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- Run time (IST): $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S')"
            echo "- index.html changed: ${{ steps.changes.outputs.changed }}"
            echo "- Update step outcome: ${{ steps.update.outcome }}"
            echo "- Dashboard: https://tejasgjadhav.github.io/daily-dashboard"
          } >> "$GITHUB_STEP_SUMMARY"
