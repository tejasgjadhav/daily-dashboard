name: Daily Dashboard Update (Enhanced)

on:
  schedule:
    # 8:30 AM IST = 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz

      - name: Run dashboard update script
        run: python update_dashboard.py

      - name: Check if changes were made
        id: check_changes
        run: |
          if git diff --quiet index.html; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'
          git add index.html
          git commit -m "🤖 Automated Dashboard Update - $(date '+%Y-%m-%d %H:%M IST') - GIFT Nifty, Nifty 50, SENSEX, VIX, USD/INR all VERIFIED" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' && steps.check_changes.outputs.changes == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .

      - name: Send success email notification
        if: success() && steps.check_changes.outputs.changes == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Daily Dashboard Updated - $(date '+%Y-%m-%d %H:%M IST')"
          to: tejasipsjadhav@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            ✅ DASHBOARD UPDATED SUCCESSFULLY

            Timestamp: $(date '+%Y-%m-%d %H:%M:%S IST')

            Market Data Updated:
            - GIFT Nifty: LIVE
            - Nifty 50: VERIFIED
            - SENSEX: VERIFIED
            - India VIX: VERIFIED
            - USD/INR: VERIFIED
            - FII/DII Flows: Tracked
            - Trump Iran War: Latest

            📊 View Dashboard: https://tejasgjadhav.github.io/daily-dashboard

            🔗 GitHub Actions Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            All metrics are sourced and verified from official NSE, RBI, and news sources.

      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Dashboard Update Failed - $(date '+%Y-%m-%d %H:%M IST')"
          to: tejasipsjadhav@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            ❌ DASHBOARD UPDATE FAILED

            Time: $(date '+%Y-%m-%d %H:%M:%S IST')

            Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Action needed: Review the GitHub Actions logs to debug the issue.

      - name: Display success summary
        if: success() && steps.check_changes.outputs.changes == 'true'
        run: |
          echo ""
          echo "✅ DASHBOARD UPDATE COMPLETE"
          echo "📊 Live Dashboard: https://tejasgjadhav.github.io/daily-dashboard"
          echo "📧 Email sent to: tejasipsjadhav@gmail.com"
          echo ""
