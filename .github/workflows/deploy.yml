name: Daily Dashboard Deploy

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Verify index.html exists
        run: |
          if [ -f index.html ]; then
            echo "✅ Dashboard file found and ready"
            cat index.html | head -20
          else
            echo "❌ index.html not found"
            exit 1
          fi
      
      - name: Deploy successful
        run: echo "Dashboard deployed at https://tejasgjadhav.github.io/daily-dashboard"
