name: Daily Dashboard Deploy

on:
  schedule:
    # 8:30 AM IST = 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update dashboard content
        run: |
          echo "Dashboard will auto-update at 8:30 AM IST daily"
          ls -la index.html

      - name: Commit and push updates
        run: |
          git config user.email "dashboard-bot@example.com"
          git config user.name "Dashboard Bot"
          git add index.html
          git commit -m "Automatic daily dashboard update - $(date)" || echo "No changes to commit"
          git push origin main
        continue-on-error: true

      - name: Verify deployment
        run: |
          echo "Dashboard deployed successfully!"
          echo "Live at: https://yourusername.github.io/daily-dashboard"
